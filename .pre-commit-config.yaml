repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyright
        name: pyright (strict)
        entry: conda run -n yt-framework -- pyright
        language: system
        pass_filenames: false
        always_run: true
      - id: pytest
        name: pytest (pre-push)
        entry: bash -c 'conda run -n yt-framework -- pytest'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
