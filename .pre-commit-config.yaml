repos:
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        language_version: python3.11
        args: [--target-version=py311]

  - repo: local
    hooks:
      - id: pytest
        name: pytest (pre-push)
        entry: bash -c 'conda run -n yt-framework -- pytest'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
