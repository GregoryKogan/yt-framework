repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyright
        name: pyright (strict)
        entry: >-
          bash -lc 'PYBIN=$(conda run -n yt-framework -- python -c "import sys; print(sys.executable)")
          && conda run -n yt-framework -- pyright --pythonpath "$PYBIN"'
        language: system
        pass_filenames: false
        always_run: true
      - id: pytest
        name: pytest (pre-push)
        entry: bash -c 'conda run -n yt-framework -- pytest'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
