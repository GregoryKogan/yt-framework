repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/DetachHead/basedpyright-pre-commit-mirror
    rev: 1.39.3
    hooks:
      - id: basedpyright
        pass_filenames: false
        always_run: true

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.16
    hooks:
      - id: vulture

  - repo: https://github.com/rubik/xenon
    rev: v0.9.3
    hooks:
      - id: xenon
        pass_filenames: false
        always_run: true
        args:
          - --max-absolute=A
          - --max-modules=A
          - --max-average=A
          - yt_framework
          - ytjobs

  - repo: https://github.com/gauge-sh/tach-pre-commit
    rev: v0.29.0
    hooks:
      - id: tach
        pass_filenames: false
        always_run: true

  - repo: local
    hooks:
      - id: pytest
        name: pytest (isolated venv)
        entry: python -m pytest
        language: python
        pass_filenames: false
        always_run: true
        args: ["-m", "not yt_cluster", "-q"]
        additional_dependencies:
          - botocore==1.35.99
          - boto3==1.35.99
          - ytsaurus-client>=0.13.0
          - python-decouple>=3.8
          - duckdb>=1.0.0
          - omegaconf>=2.3.0
          - pytest>=7.0.0
