repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/DetachHead/basedpyright-pre-commit-mirror
    rev: 1.39.3
    hooks:
      - id: basedpyright
        pass_filenames: false
        always_run: true

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.16
    hooks:
      - id: vulture

  - repo: https://github.com/rubik/xenon
    rev: v0.9.3
    hooks:
      - id: xenon
        pass_filenames: false
        always_run: true
        args:
          - --max-absolute=C
          - --max-modules=B
          - --max-average=A
          - yt_framework
          - ytjobs

  - repo: local
    hooks:
      - id: pytest
        name: pytest (pre-push)
        entry: bash -c 'conda run -n yt-framework -- pytest'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
