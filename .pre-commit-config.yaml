repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/DetachHead/basedpyright-pre-commit-mirror
    rev: 1.39.3
    hooks:
      - id: basedpyright
        pass_filenames: false
        always_run: true

  - repo: local
    hooks:
      - id: pytest
        name: pytest (pre-push)
        entry: bash -c 'conda run -n yt-framework -- pytest'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
