[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "yt_framework"
version = "1.3.7"
description = "YTsaurus pipeline framework with utilities and common modules"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
    {name = "Artem Zavarzin", email = "artemutz555@gmail.com"},
    {name = "Gregory Koganovsky", email = "g.koganovsky@gmail.com"},
]
maintainers = [
    {name = "Gregory Koganovsky", email = "g.koganovsky@gmail.com"},
    {name = "Artem Zavarzin", email = "artemutz555@gmail.com"},
]
keywords = [
    "ytsaurus",
    "yt",
    "pipeline",
    "data-processing",
    "map-reduce",
    "distributed-computing",
    "big-data",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering",
    "Topic :: System :: Distributed Computing",
]
dependencies = [
    "botocore==1.35.99",
    "boto3==1.35.99",
    "ytsaurus-client>=0.13.0",
    "python-decouple>=3.8",
    "duckdb>=1.0.0",
    "omegaconf>=2.3.0",
]

[project.urls]
Repository = "https://github.com/GregoryKogan/yt-framework"
Documentation = "https://yt-framework.readthedocs.io/en/latest/"
Issues = "https://github.com/GregoryKogan/yt-framework/issues"

[project.optional-dependencies]
dev = [
    "black==26.3.1",
    "pre-commit>=4.0.0",
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
]
docs = [
    "sphinx>=7.2.0",
    "myst-parser[linkify]>=2.0.0",
    "pydata-sphinx-theme>=0.15.0",
    "sphinx-copybutton>=0.5.2",
    "sphinx-design>=0.5.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "unit: fast deterministic tests (default scope)",
    "integration: tests that need dev mode, fakes, or external boundaries",
    "yt_cluster: real YTsaurus cluster integration (requires credentials; see docs/testing/yt-cluster-integration.md)",
]

[tool.black]
line-length = 88
target-version = ["py311"]

[tool.coverage.run]
branch = true
source = ["yt_framework", "ytjobs"]

[tool.setuptools.packages.find]
where = ["."]
include = ["yt_framework*", "ytjobs*"]
