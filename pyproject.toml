[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.coverage.run]
branch = true
source = ["yt_framework", "ytjobs"]

[tool.setuptools.packages.find]
where = ["."]
include = ["yt_framework*", "ytjobs*"]
