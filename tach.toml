exclude = [
    "**/__pycache__",
    "**/*.egg-info",
    ".eggs/",
    "build/",
    "dist/",
    "docs/**",
    "examples/**",
    "scripts/**",
    "tests/**",
    "tools/**",
]
source_roots = ["."]
exact = true
ignore_type_checking_imports = false
forbid_circular_dependencies = true
layers_explicit_depends_on = true
root_module = "forbid"

layers = ["core", "operations", "yt", "foundation", "jobs"]

# Inner -> outer: foundation (utils, job_command, typed_jobs) -> yt (cluster
# adapters) -> operations (stage drivers) -> core (pipeline). ytjobs stays
# job-side and must not import yt_framework.

[external]
rename = ["yt:ytsaurus-client"]

[[modules]]
path = "yt_framework"
depends_on = []
layer = "foundation"
cannot_depend_on = ["ytjobs", "ytjobs.checkpoint", "ytjobs.config", "ytjobs.logging", "ytjobs.mapper", "ytjobs.s3"]

[[modules]]
path = "yt_framework.job_command"
depends_on = []
layer = "foundation"
cannot_depend_on = [
    "yt_framework",
    "yt_framework.core",
    "yt_framework.operations",
    "yt_framework.typed_jobs",
    "yt_framework.utils",
    "yt_framework.yt",
    "ytjobs",
    "ytjobs.checkpoint",
    "ytjobs.config",
    "ytjobs.logging",
    "ytjobs.mapper",
    "ytjobs.s3",
]

